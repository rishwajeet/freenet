name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Download Mihomo binary
        run: |
          MIHOMO_VERSION="v1.19.10"
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-darwin-arm64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          mv mihomo FreeNet/Resources/mihomo

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: |
          xcodebuild build \
            -project FreeNet.xcodeproj \
            -scheme FreeNet \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/FreeNet.app dmg-staging/
          hdiutil create -volname FreeNet -srcfolder dmg-staging -ov -format UDZO FreeNet.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" FreeNet.dmg \
            --title "FreeNet $TAG" \
            --generate-notes
